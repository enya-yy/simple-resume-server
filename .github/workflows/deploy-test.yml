name: deploy-test-server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-test-server
  cancel-in-progress: true

env:
  TEST_SSH_HOST: ${{ vars.TEST_SSH_HOST || '81.70.167.194' }}
  TEST_SSH_USER: ${{ vars.TEST_SSH_USER || 'ubuntu' }}
  TEST_SSH_PORT: ${{ vars.TEST_SSH_PORT || '22' }}
  TEST_SERVER_DIR: ${{ vars.TEST_SERVER_DIR || '/home/ubuntu/projects/simple-resume/server' }}
  TEST_PM2_API_NAME: ${{ vars.TEST_PM2_API_NAME || 'simple-resume-api' }}
  TEST_PM2_WORKER_NAME: ${{ vars.TEST_PM2_WORKER_NAME || 'simple-resume-worker' }}
  TEST_SQLITE_DATABASE_PATH: ${{ vars.TEST_SQLITE_DATABASE_PATH || '/home/ubuntu/projects/simple-resume/db/simple-resume.db' }}
  TEST_EXPORT_LOCAL_DIR: ${{ vars.TEST_EXPORT_LOCAL_DIR || '/home/ubuntu/projects/simple-resume/exports' }}
  TEST_SSH_OPTIONS: >-
    -o StrictHostKeyChecking=no
    -o UserKnownHostsFile=/dev/null
    -o ServerAliveInterval=30
    -o ServerAliveCountMax=20
    -o TCPKeepAlive=yes

jobs:
  deploy-server:
    name: deploy server to test server
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Validate deployment configuration
        env:
          SSHPASS: ${{ secrets.TEST_SSH_PASSWORD }}
        run: |
          if [ -z "${SSHPASS:-}" ]; then
            echo "Missing required GitHub secret: TEST_SSH_PASSWORD"
            exit 1
          fi

      - name: Prepare remote server directory
        env:
          SSHPASS: ${{ secrets.TEST_SSH_PASSWORD }}
        run: |
          sshpass -e ssh \
            -p "$TEST_SSH_PORT" \
            $TEST_SSH_OPTIONS \
            "$TEST_SSH_USER@$TEST_SSH_HOST" \
            "TEST_SERVER_DIR='$TEST_SERVER_DIR' TEST_SQLITE_DATABASE_PATH='$TEST_SQLITE_DATABASE_PATH' TEST_SSH_USER='$TEST_SSH_USER' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          sqlite_db_dir="$(dirname "$TEST_SQLITE_DATABASE_PATH")"

          if ! mkdir -p "$TEST_SERVER_DIR" "$sqlite_db_dir" 2>/dev/null; then
            if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo -n mkdir -p "$TEST_SERVER_DIR" "$sqlite_db_dir"
            else
              echo "Cannot create $TEST_SERVER_DIR or $sqlite_db_dir as $(whoami), and passwordless sudo is unavailable."
              exit 1
            fi
          fi

          for dir in "$TEST_SERVER_DIR" "$sqlite_db_dir"; do
            if [ ! -w "$dir" ]; then
              if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
                remote_group="$(id -gn "$TEST_SSH_USER")"
                sudo -n chown -R "$TEST_SSH_USER:$remote_group" "$dir"
              else
                echo "$dir is not writable by $(whoami). Run: sudo chown -R $TEST_SSH_USER:$(id -gn "$TEST_SSH_USER") $dir"
                exit 1
              fi
            fi
          done
          REMOTE_SCRIPT

      - name: Sync server source
        env:
          SSHPASS: ${{ secrets.TEST_SSH_PASSWORD }}
        run: |
          sshpass -e rsync -az --delete --no-owner --no-group --no-perms \
            -e "ssh -p $TEST_SSH_PORT $TEST_SSH_OPTIONS" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='*.env' \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='coverage/' \
            --exclude='data/' \
            --exclude='.DS_Store' \
            ./ "$TEST_SSH_USER@$TEST_SSH_HOST:$TEST_SERVER_DIR/"

      - name: Build and reload server on test server
        env:
          SSHPASS: ${{ secrets.TEST_SSH_PASSWORD }}
        run: |
          sshpass -e ssh \
            -p "$TEST_SSH_PORT" \
            $TEST_SSH_OPTIONS \
            "$TEST_SSH_USER@$TEST_SSH_HOST" \
            "TEST_SERVER_DIR='$TEST_SERVER_DIR' TEST_PM2_API_NAME='$TEST_PM2_API_NAME' TEST_PM2_WORKER_NAME='$TEST_PM2_WORKER_NAME' TEST_SQLITE_DATABASE_PATH='$TEST_SQLITE_DATABASE_PATH' TEST_EXPORT_LOCAL_DIR='$TEST_EXPORT_LOCAL_DIR' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          export NODE_ENV=production
          export SQLITE_DATABASE_PATH="$TEST_SQLITE_DATABASE_PATH"
          # 避免 pnpm install/rebuild 时从 Google CDN 拉 Chrome 卡死；由 ensure_puppeteer_chrome 提供浏览器。
          export PUPPETEER_SKIP_DOWNLOAD=true
          # 测试机走 HTTP：session 须可写入非 Secure cookie，否则 CSRF / 登录恒为 403
          export SESSION_COOKIE_SECURE=false
          export TRUST_PROXY=true

          ENV_FILE="$TEST_SERVER_DIR/.env"
          touch "$ENV_FILE"
          upsert_env() {
            local key="$1"
            local val="$2"
            if grep -q "^${key}=" "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^${key}=.*|${key}=${val}|" "$ENV_FILE"
            else
              echo "${key}=${val}" >> "$ENV_FILE"
            fi
          }
          remove_env() {
            local key="$1"
            if grep -q "^${key}=" "$ENV_FILE" 2>/dev/null; then
              sed -i "/^${key}=/d" "$ENV_FILE"
            fi
          }
          upsert_env SESSION_COOKIE_SECURE false
          upsert_env TRUST_PROXY true

          # Worker 上传导出 PDF、API 签发下载链接均依赖 S3 或 EXPORT_LOCAL_DIR
          if ! mkdir -p "$TEST_EXPORT_LOCAL_DIR" 2>/dev/null; then
            if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo -n mkdir -p "$TEST_EXPORT_LOCAL_DIR"
              remote_group="$(id -gn)"
              sudo -n chown -R "$(whoami):$remote_group" "$TEST_EXPORT_LOCAL_DIR"
            else
              echo "Cannot create export dir $TEST_EXPORT_LOCAL_DIR"
              exit 1
            fi
          fi
          upsert_env EXPORT_LOCAL_DIR "$TEST_EXPORT_LOCAL_DIR"

          WORKER_DIR="$TEST_SERVER_DIR/worker"
          PUPPETEER_CACHE_DIR="$WORKER_DIR/.cache/puppeteer"
          mkdir -p "$PUPPETEER_CACHE_DIR"
          upsert_env PUPPETEER_CACHE_DIR "$PUPPETEER_CACHE_DIR"

          PUPPETEER_MIRROR="https://cdn.npmmirror.com/binaries/chrome-for-testing"

          pnpm_cmd() {
            corepack pnpm@10.33.0 "$@"
          }

          # timeout(1) uses execvp and cannot see bash functions — call corepack directly.
          pnpm_timeout() {
            local secs="$1"
            shift
            timeout "$secs" corepack pnpm@10.33.0 "$@"
          }

          chrome_is_usable_binary() {
            local candidate="$1"
            [ -x "$candidate" ] || return 1
            # snap 包装脚本/路径在 headless SSH 部署里 Puppeteer 无法可靠启动。
            case "$candidate" in
              /snap/*) return 1 ;;
            esac
            if head -c 2 "$candidate" 2>/dev/null | grep -q '^#!'; then
              return 1
            fi
            return 0
          }

          resolve_chrome_path() {
            for candidate in \
              /usr/bin/google-chrome-stable \
              /usr/bin/google-chrome \
              /usr/bin/chromium; do
              if chrome_is_usable_binary "$candidate"; then
                echo "$candidate"
                return 0
              fi
            done
            return 1
          }

          puppeteer_cache_has_chrome() {
            find "$PUPPETEER_CACHE_DIR" -type f \( -name chrome -o -name chrome-headless-shell \) -perm -111 2>/dev/null | grep -q .
          }

          verify_chrome_launch() {
            local exec_path=""
            if grep -q '^PUPPETEER_EXECUTABLE_PATH=' "$ENV_FILE" 2>/dev/null; then
              exec_path="$(grep '^PUPPETEER_EXECUTABLE_PATH=' "$ENV_FILE" | tail -1 | cut -d= -f2-)"
            fi
            echo "[deploy] verifying Chrome launch (timeout 45s)"
            if PUPPETEER_CACHE_DIR="$PUPPETEER_CACHE_DIR" PUPPETEER_EXECUTABLE_PATH="$exec_path" \
              pnpm_timeout 45 --dir "$WORKER_DIR" exec node --input-type=module -e "
              import puppeteer from 'puppeteer';
              const path = process.env.PUPPETEER_EXECUTABLE_PATH?.trim() || puppeteer.executablePath();
              const browser = await puppeteer.launch({
                headless: true,
                executablePath: path,
                args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage', '--disable-gpu'],
                timeout: 30000,
              });
              await browser.close();
              console.log('[deploy] Chrome launch ok:', path);
            "; then
              return 0
            fi
            return 1
          }

          apt_chromium_is_snap_transitional() {
            # Ubuntu 22.04+ 的 chromium-browser 是 snap 过渡包，非交互 SSH 里 apt 会卡死。
            apt-cache show chromium-browser >/dev/null 2>&1 \
              && apt-cache depends chromium-browser 2>/dev/null | grep -q 'snap:'
          }

          ensure_puppeteer_chrome() {
            local chrome_path=""

            # 优先 Puppeteer 缓存（Chrome for Testing），避免 Ubuntu snap 包装脚本。
            if puppeteer_cache_has_chrome; then
              echo "[deploy] Puppeteer Chrome already cached at $PUPPETEER_CACHE_DIR"
              remove_env PUPPETEER_EXECUTABLE_PATH
              if verify_chrome_launch; then
                return 0
              fi
              echo "[deploy] cached Chrome failed launch check; reinstalling"
            fi

            echo "[deploy] installing Puppeteer Chrome via npmmirror (timeout 600s)"
            if PUPPETEER_CACHE_DIR="$PUPPETEER_CACHE_DIR" \
              PUPPETEER_DOWNLOAD_BASE_URL="$PUPPETEER_MIRROR" \
              PUPPETEER_CHROME_DOWNLOAD_BASE_URL="$PUPPETEER_MIRROR" \
              pnpm_timeout 600 --dir "$WORKER_DIR" exec puppeteer browsers install chrome; then
              echo "[deploy] puppeteer Chrome installed to $PUPPETEER_CACHE_DIR"
              remove_env PUPPETEER_EXECUTABLE_PATH
              if verify_chrome_launch; then
                return 0
              fi
              echo "[deploy] npmmirror Chrome failed launch check; trying system Chromium"
            fi

            if command -v apt-get >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              if apt_chromium_is_snap_transitional; then
                echo "[deploy] skipping apt chromium-browser (snap transitional package)"
              elif apt-cache show chromium >/dev/null 2>&1; then
                echo "[deploy] trying apt chromium deb (timeout 180s)"
                timeout 180 sudo -n DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends chromium || true
              fi
            fi

            if chrome_path="$(resolve_chrome_path)"; then
              echo "[deploy] using system Chrome/Chromium at $chrome_path"
              upsert_env PUPPETEER_EXECUTABLE_PATH "$chrome_path"
              if verify_chrome_launch; then
                return 0
              fi
              echo "[deploy] system Chromium failed launch check"
            fi

            echo "[deploy] ERROR: no Chromium binary available for PDF export"
            return 1
          }

          # Puppeteer PDF 导出：Chrome 运行时依赖（缺库时 launch 会失败）
          if command -v apt-get >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo -n apt-get update -qq || true
            sudo -n DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              ca-certificates fonts-liberation fonts-noto-cjk \
              libasound2 libatk-bridge2.0-0 libatk1.0-0 libc6 libcairo2 libcups2 \
              libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libglib2.0-0 libgtk-3-0 \
              libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libx11-6 libx11-xcb1 \
              libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 \
              libxrandr2 libxrender1 libxss1 libxtst6 \
              >/dev/null 2>&1 || true
            if command -v fc-cache >/dev/null 2>&1; then
              sudo -n fc-cache -f >/dev/null 2>&1 || true
            fi
          fi

          install_native_build_deps() {
            if command -v apt-get >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              echo "[deploy] installing native module build deps"
              sudo -n apt-get update -qq || true
              sudo -n DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                build-essential python3 pkg-config libsqlite3-dev \
                >/dev/null 2>&1 || true
            fi
          }

          rebuild_better_sqlite3() {
            local dir="${1:-}"
            if [ -n "$dir" ]; then
              echo "[deploy] rebuilding better-sqlite3 in $dir"
              pnpm_cmd --dir "$dir" rebuild better-sqlite3
            else
              echo "[deploy] rebuilding better-sqlite3 in server root"
              pnpm_cmd rebuild better-sqlite3
            fi
          }

          verify_better_sqlite3() {
            local dir="$1"
            echo "[deploy] verifying better-sqlite3 in $dir"
            pnpm_cmd --dir "$dir" exec node --input-type=module -e "
              import 'better-sqlite3';
              console.log('[deploy] better-sqlite3 ok in $dir');
            "
          }

          pm2_reload_or_start() {
            local name="$1"
            local cwd="$2"
            local entry="$3"

            if pm2 describe "$name" >/dev/null 2>&1; then
              pm2 reload "$name" --update-env 2>/dev/null || pm2 restart "$name" --update-env
              return
            fi

            echo "[deploy] PM2 process $name not found; starting in $cwd"
            (
              cd "$cwd"
              pm2 start "$entry" --name "$name" --update-env
            )
          }

          if ! command -v pm2 >/dev/null 2>&1; then
            echo "pm2 is required on the test server but was not found in PATH."
            exit 1
          fi

          (
            while true; do
              sleep 30
              echo "[deploy] remote build still running at $(date -u +%H:%M:%SZ)"
            done
          ) &
          heartbeat_pid=$!
          trap 'kill "$heartbeat_pid" 2>/dev/null || true' EXIT

          cd "$TEST_SERVER_DIR"
          echo "[deploy] step: native build deps"
          install_native_build_deps
          echo "[deploy] step: sqlite-pg install/build"
          pnpm_cmd --dir packages/sqlite-pg install --frozen-lockfile
          pnpm_cmd --dir packages/sqlite-pg rebuild --pending
          rebuild_better_sqlite3 packages/sqlite-pg
          pnpm_cmd --dir packages/sqlite-pg build
          echo "[deploy] step: api install"
          pnpm_cmd install --frozen-lockfile
          pnpm_cmd rebuild --pending
          rebuild_better_sqlite3
          echo "[deploy] step: worker install"
          pnpm_cmd --dir worker install --frozen-lockfile
          pnpm_cmd --dir worker rebuild --pending
          rebuild_better_sqlite3 worker
          verify_better_sqlite3 worker
          node -r ./scripts/load-sqlite-env.cjs <<'NODE'
          const { mkdirSync } = require('node:fs');
          const { dirname, resolve } = require('node:path');
          const { resolveSqliteFilePath } = require('@simple-resume/sqlite-pg');

          const monorepoRoot = resolve(process.cwd(), '..');
          const sqlitePath = resolveSqliteFilePath(process.env.SQLITE_DATABASE_PATH, monorepoRoot);
          mkdirSync(dirname(sqlitePath), { recursive: true });
          console.log(`[deploy] SQLite database path: ${sqlitePath}`);
          NODE
          echo "[deploy] step: api build"
          pnpm_cmd build
          echo "[deploy] step: sqlite migrate"
          pnpm_cmd migrate

          echo "[deploy] step: worker build"
          pnpm_cmd --dir "$WORKER_DIR" build
          echo "[deploy] step: ensure Chromium for PDF export"
          ensure_puppeteer_chrome

          echo "[deploy] step: pm2 reload"
          pm2_reload_or_start "$TEST_PM2_API_NAME" "$TEST_SERVER_DIR" "dist/main.js"
          pm2_reload_or_start "$TEST_PM2_WORKER_NAME" "$TEST_SERVER_DIR/worker" "dist/main.js"
          REMOTE_SCRIPT
