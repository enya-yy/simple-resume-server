name: deploy-test-server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-test-server
  cancel-in-progress: true

env:
  TEST_SSH_HOST: ${{ vars.TEST_SSH_HOST || '81.70.167.194' }}
  TEST_SSH_USER: ${{ vars.TEST_SSH_USER || 'ubuntu' }}
  TEST_SSH_PORT: ${{ vars.TEST_SSH_PORT || '22' }}
  TEST_SERVER_DIR: ${{ vars.TEST_SERVER_DIR || '/home/ubuntu/projects/simple-resume/server' }}
  TEST_PM2_API_NAME: ${{ vars.TEST_PM2_API_NAME || 'simple-resume-api' }}
  TEST_PM2_WORKER_NAME: ${{ vars.TEST_PM2_WORKER_NAME || 'simple-resume-worker' }}
  TEST_SQLITE_DATABASE_PATH: ${{ vars.TEST_SQLITE_DATABASE_PATH || '/home/ubuntu/projects/simple-resume/db/simple-resume.db' }}
  TEST_SSH_OPTIONS: >-
    -o StrictHostKeyChecking=no
    -o UserKnownHostsFile=/dev/null
    -o ServerAliveInterval=30
    -o ServerAliveCountMax=20
    -o TCPKeepAlive=yes

jobs:
  deploy-server:
    name: deploy server to test server
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Validate deployment configuration
        env:
          SSHPASS: ${{ secrets.TEST_SSH_PASSWORD }}
        run: |
          if [ -z "${SSHPASS:-}" ]; then
            echo "Missing required GitHub secret: TEST_SSH_PASSWORD"
            exit 1
          fi

      - name: Prepare remote server directory
        env:
          SSHPASS: ${{ secrets.TEST_SSH_PASSWORD }}
        run: |
          sshpass -e ssh \
            -p "$TEST_SSH_PORT" \
            $TEST_SSH_OPTIONS \
            "$TEST_SSH_USER@$TEST_SSH_HOST" \
            "TEST_SERVER_DIR='$TEST_SERVER_DIR' TEST_SQLITE_DATABASE_PATH='$TEST_SQLITE_DATABASE_PATH' TEST_SSH_USER='$TEST_SSH_USER' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          sqlite_db_dir="$(dirname "$TEST_SQLITE_DATABASE_PATH")"

          if ! mkdir -p "$TEST_SERVER_DIR" "$sqlite_db_dir" 2>/dev/null; then
            if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo -n mkdir -p "$TEST_SERVER_DIR" "$sqlite_db_dir"
            else
              echo "Cannot create $TEST_SERVER_DIR or $sqlite_db_dir as $(whoami), and passwordless sudo is unavailable."
              exit 1
            fi
          fi

          for dir in "$TEST_SERVER_DIR" "$sqlite_db_dir"; do
            if [ ! -w "$dir" ]; then
              if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
                remote_group="$(id -gn "$TEST_SSH_USER")"
                sudo -n chown -R "$TEST_SSH_USER:$remote_group" "$dir"
              else
                echo "$dir is not writable by $(whoami). Run: sudo chown -R $TEST_SSH_USER:$(id -gn "$TEST_SSH_USER") $dir"
                exit 1
              fi
            fi
          done
          REMOTE_SCRIPT

      - name: Sync server source
        env:
          SSHPASS: ${{ secrets.TEST_SSH_PASSWORD }}
        run: |
          sshpass -e rsync -az --delete --no-owner --no-group --no-perms \
            -e "ssh -p $TEST_SSH_PORT $TEST_SSH_OPTIONS" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='*.env' \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='coverage/' \
            --exclude='data/' \
            --exclude='.DS_Store' \
            ./ "$TEST_SSH_USER@$TEST_SSH_HOST:$TEST_SERVER_DIR/"

      - name: Build and reload server on test server
        env:
          SSHPASS: ${{ secrets.TEST_SSH_PASSWORD }}
        run: |
          sshpass -e ssh \
            -p "$TEST_SSH_PORT" \
            $TEST_SSH_OPTIONS \
            "$TEST_SSH_USER@$TEST_SSH_HOST" \
            "TEST_SERVER_DIR='$TEST_SERVER_DIR' TEST_PM2_API_NAME='$TEST_PM2_API_NAME' TEST_PM2_WORKER_NAME='$TEST_PM2_WORKER_NAME' TEST_SQLITE_DATABASE_PATH='$TEST_SQLITE_DATABASE_PATH' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          export NODE_ENV=production
          export SQLITE_DATABASE_PATH="$TEST_SQLITE_DATABASE_PATH"
          # 测试机走 HTTP：session 须可写入非 Secure cookie，否则 CSRF / 登录恒为 403
          export SESSION_COOKIE_SECURE=false
          export TRUST_PROXY=true

          pnpm_cmd() {
            corepack pnpm@10.33.0 "$@"
          }

          pm2_reload_or_start() {
            local name="$1"
            local cwd="$2"
            local entry="$3"

            if pm2 describe "$name" >/dev/null 2>&1; then
              pm2 reload "$name" --update-env 2>/dev/null || pm2 restart "$name" --update-env
              return
            fi

            echo "[deploy] PM2 process $name not found; starting in $cwd"
            (
              cd "$cwd"
              pm2 start "$entry" --name "$name" --update-env
            )
          }

          if ! command -v pm2 >/dev/null 2>&1; then
            echo "pm2 is required on the test server but was not found in PATH."
            exit 1
          fi

          (
            while true; do
              sleep 30
              echo "[deploy] remote build still running at $(date -u +%H:%M:%SZ)"
            done
          ) &
          heartbeat_pid=$!
          trap 'kill "$heartbeat_pid" 2>/dev/null || true' EXIT

          cd "$TEST_SERVER_DIR"
          pnpm_cmd --dir packages/sqlite-pg install --frozen-lockfile
          pnpm_cmd --dir packages/sqlite-pg rebuild --pending
          pnpm_cmd --dir packages/sqlite-pg build
          pnpm_cmd install --frozen-lockfile
          pnpm_cmd rebuild --pending
          pnpm_cmd --dir worker install --frozen-lockfile
          pnpm_cmd --dir worker rebuild --pending
          node -r ./scripts/load-sqlite-env.cjs <<'NODE'
          const { mkdirSync } = require('node:fs');
          const { dirname, resolve } = require('node:path');
          const { resolveSqliteFilePath } = require('@simple-resume/sqlite-pg');

          const monorepoRoot = resolve(process.cwd(), '..');
          const sqlitePath = resolveSqliteFilePath(process.env.SQLITE_DATABASE_PATH, monorepoRoot);
          mkdirSync(dirname(sqlitePath), { recursive: true });
          console.log(`[deploy] SQLite database path: ${sqlitePath}`);
          NODE
          pnpm_cmd build
          pnpm_cmd migrate

          cd "$TEST_SERVER_DIR/worker"
          pnpm_cmd build

          pm2_reload_or_start "$TEST_PM2_API_NAME" "$TEST_SERVER_DIR" "dist/main.js"
          pm2_reload_or_start "$TEST_PM2_WORKER_NAME" "$TEST_SERVER_DIR/worker" "dist/main.js"
          REMOTE_SCRIPT
